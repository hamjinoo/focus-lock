<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>focus-lock</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <h1>focus-lock</h1>
  <div id="status" class="status">…</div>
</header>

<main>
  <section>
    <h2>지금 시작 (Frozen)</h2>
    <p class="note">시작하면 만료 전까지 해제 불가. 충동 가드레일 모드.</p>
    <form id="frozen-form">
      <label>라벨 <input name="label" value="focus" maxlength="80" /></label>
      <label>시간 (분) <input name="minutes" type="number" min="1" max="1440" value="60" required /></label>
      <label class="checkbox"><input type="checkbox" name="frozen" checked /> Frozen (해제 불가)</label>
      <button type="submit">시작</button>
    </form>
    <div id="sessions"></div>
  </section>

  <section>
    <h2>스케줄</h2>
    <form id="schedule-form">
      <label>이름 <input name="name" value="평일 업무시간" required /></label>
      <div class="days">
        <label><input type="checkbox" name="d" value="0" checked /> 월</label>
        <label><input type="checkbox" name="d" value="1" checked /> 화</label>
        <label><input type="checkbox" name="d" value="2" checked /> 수</label>
        <label><input type="checkbox" name="d" value="3" checked /> 목</label>
        <label><input type="checkbox" name="d" value="4" checked /> 금</label>
        <label><input type="checkbox" name="d" value="5" /> 토</label>
        <label><input type="checkbox" name="d" value="6" /> 일</label>
      </div>
      <label>시작 <input name="start" type="time" value="09:00" required /></label>
      <label>종료 <input name="end" type="time" value="18:00" required /></label>
      <button type="submit">추가</button>
    </form>
    <ul id="schedules" class="list"></ul>
  </section>

  <section>
    <h2>차단 도메인</h2>
    <form id="block-form">
      <input name="domain" placeholder="예: youtube.com" required />
      <button type="submit">추가</button>
    </form>
    <ul id="blocklist" class="list"></ul>
  </section>

  <section>
    <h2>최근 이벤트</h2>
    <ul id="audit" class="list audit"></ul>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
